name: CrediTrust Production CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Verify
        run: |
          pip install -r requirements.txt
          python -c "import app; print('Production Build Ready')"
